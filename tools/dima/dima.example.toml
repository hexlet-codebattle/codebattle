# dima.toml — copy to dima.toml and tweak.
# Anything here is overridden by CLI flags.

server = "http://localhost:4000"
auth_key = "x-key"

users = 200
group_task_id = 1
runner_url = "http://localhost:1234/run"

# Tournament defaults are ranked: round 1 is a single-leaderboard seeding
# round (solo vs bots), rounds 2..rounds_count slice players into
# `slice_size` buckets with cascade movement and diagonal scoring.
# Set type = "individual" for the legacy single-round load test.
type = "ranked"
slice_size = 8
slice_strategy = "random"   # or "rating"
rounds_count = 5            # 1 seeding + 4 slice rounds
round_timeout_seconds = 60  # length of each round (seconds)
max_score = 1000            # per-round top score (slice 0 / 1st place gets this)
scoring_strategy = "diagonal_quadratic"  # diagonal_linear | global_linear
movement_strategy = "mirrored_cascade"   # global_rerank | neighbor_ladder
place_weight = 1
has_seed_round = true                    # round 1 is solo-vs-bots seeding; false = all rounds are slice rounds
# include_bots = false      # ranked slices auto-pad short slices with bots regardless

avg_submit_seconds = 20
randomness = 30
join_ramp_seconds = 5

langs = ["python", "cpp"]

[solutions]
# Each directory should hold one solution per file. The bots pick a
# random file from the matching language pool on every submission.
python_dir = "./solutions/python"
cpp_dir = "./solutions/cpp"
